<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>User Registration</h1>
    <h2>Personal Details</h2>
    <form>
      <div>
        <label>First Name:</label>
        <input type="text" />
      </div>
      <br />

      <div>
        <label>Last Name:</label>
        <input type="text" />
      </div>
      <br />

      <div>
        <label>Age:</label>
        <input type="number" />
      </div>
      <br />

      <div>
        <label>Gender:</label>
        <select>
          <option selected>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
      <br />

      <div>
        <label>Profile Picture:</label>
        <button>Browse...</button>
        <p>No files selected.</p>
      </div>
      <br />

      <h2>Account Details:</h2>
      <div>
        <label>Email:</label>
        <input type="email" />
      </div>
      <br />
      <div>
        <label>Password:</label>
        <input type="password" />
      </div>
      <br />
      <div>
        <label>Role:</label>
        <label>Admin</label>
        <input type="radio" />
        <label>User</label>
        <input type="radio" />
      </div>
      <br />
      <div>
        <input type="checkbox" />
        <p>I agree with the terms and conditions</p>
      </div>
      <br />
      <div>
        <button>Register</button>
        <button>Reset</button>
      </div>
      <br />
    </form>

    <footer>© 2026 My TodoList.All rights reserved.</footer>
  </body>
</html>
